<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Haushaltskosten-App zur Verwaltung von Ausgaben">
  <meta name="author" content="JoeDus-prog">
  <meta name="keywords" content="Haushalt, Kosten, Budget, Ausgaben, Verwaltung">
  
  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    connect-src 'self';
    form-action 'self';
  ">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#3498db">
  
  <!-- Open Graph / Social -->
  <meta property="og:title" content="Haushaltskosten-App">
  <meta property="og:description" content="Eine einfache Web-App zur Verwaltung von Haushaltskosten">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://github.com/JoeDus-prog/Haushaltskosten-app">
  <meta name="twitter:card" content="summary">
  
  <title>Haushaltskosten-App</title>
  <link rel="stylesheet" href="src/css/styles.css">
  
  <!-- Preload critical resources -->
  <link rel="preload" href="src/css/styles.css" as="style">
  <link rel="preload" href="src/js/app.js" as="script">
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Theme umschalten">🌍</button>
  
  <div class="container">
    <h1>Wer hat was gezahlt?</h1>
    
    <form id="costForm" class="cost-form">
      <div class="form-group">
        <input type="text" id="person" placeholder="z. B. Max" required aria-label="Name der Person">
      </div>
      <div class="form-group">
        <input type="number" id="amount" placeholder="z. B. 50.00" step="0.01" min="0" required aria-label="Betrag in Euro">
      </div>
      <div class="form-group">
        <input type="text" id="reason" placeholder="z. B. Einkaufen, Strom, Miete" aria-label="Grund für die Ausgabe">
      </div>
      <button type="submit" class="btn" aria-label="Kosteneintrag hinzufügen">Hinzufügen</button>
    </form>

    <div class="summary" id="summary" aria-labelledby="total-label">
      <h2 id="total-label" class="visually-hidden">Gesamtbetrag</h2>
      <p>Gesamt: <span id="totalAmount">0€</span></p>
    </div>

    <ul id="costList" class="cost-list" role="list">
      <!-- Kosten werden dynamisch eingefügt -->
    </ul>
  </div>

  <!-- Load app module -->
  <script type="module" src="src/js/app.js"></script>
  
  <!-- Theme Toggle Script (inline für CSP) -->
  <script>
    // Theme Toggle Functionality
    document.addEventListener('DOMContentLoaded', function() {
      const themeToggle = document.getElementById('themeToggle');
      const html = document.documentElement;
      
      // Load saved theme or use system preference
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        html.setAttribute('data-theme', 'dark');
        themeToggle.textContent = '☀️';
      }
      
      // Toggle theme
      themeToggle.addEventListener('click', function() {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        
        // Update button icon
        themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌍';
      });
      
      // Watch for system theme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!localStorage.getItem('theme')) {
          html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
          themeToggle.textContent = e.matches ? '☀️' : '🌍';
        }
      });
    });
  </script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
