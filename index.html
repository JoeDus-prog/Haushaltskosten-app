<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verwalte deine Haushaltskosten einfach und übersichtlich mit dieser Web-App.">
  <meta name="keywords" content="Haushalt, Kosten, Budget, Ausgaben, Verwaltung">
  <meta name="author" content="JoeDus-prog">
  <meta property="og:title" content="Haushaltskosten-App">
  <meta property="og:description" content="Eine einfache Web-App zur Verwaltung von Haushaltskosten.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://joedus-prog.github.io/Haushaltskosten-app/">
  <meta name="twitter:card" content="summary">
  <title>Haushaltskosten-App</title>
  <link rel="stylesheet" href="src/css/styles.css">
  <!-- Chart.js CDN for visualizations -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Theme umschalten">🌍</button>
  
  <div class="container">
    <h1>Wer hat was gezahlt?</h1>
    
    <form id="costForm" class="cost-form">
      <div class="form-group">
        <input type="text" id="person" placeholder="Name" required aria-label="Name der Person">
      </div>
      <div class="form-group">
        <input type="number" id="amount" placeholder="Betrag (€)" step="0.01" min="0" required aria-label="Betrag in Euro">
      </div>
      <div class="form-group">
        <input type="text" id="reason" placeholder="Grund (z. B. Einkaufen)" aria-label="Grund für die Ausgabe">
      </div>
      <div class="form-group">
        <select id="category" aria-label="Kategorie">
          <option value="">Keine Kategorie</option>
          <option value="Lebensmittel">Lebensmittel</option>
          <option value="Haushalt">Haushalt</option>
          <option value="Miete">Miete</option>
          <option value="Strom">Strom</option>
          <option value="Internet">Internet</option>
          <option value="Sonstiges">Sonstiges</option>
        </select>
      </div>
      <div class="form-group">
        <input type="date" id="date" aria-label="Datum">
      </div>
      <button type="submit" class="btn" aria-label="Kosteneintrag hinzufügen">Hinzufügen</button>
    </form>

    <div class="summary" id="summary">
      <p>Gesamt: <span id="totalAmount">0€</span></p>
    </div>

    <!-- Export/Import Buttons -->
    <div class="export-group">
      <button id="exportCSV" class="btn btn-secondary">Export (CSV)</button>
      <button id="exportJSON" class="btn btn-secondary">Export (JSON)</button>
      <input type="file" id="importFile" accept=".csv,.json" style="display: none;">
      <button id="importBtn" class="btn btn-secondary">Import</button>
      <button id="clearAll" class="btn btn-danger">Alle löschen</button>
    </div>

    <!-- Filters -->
    <div class="filters-group">
      <div class="filter-item">
        <label for="categoryFilter">Kategorie:</label>
        <select id="categoryFilter" aria-label="Kategorie filtern">
          <option value="">Alle Kategorien</option>
        </select>
      </div>
      <div class="filter-item">
        <label for="dateFilter">Zeitraum:</label>
        <select id="dateFilter" aria-label="Zeitraum filtern">
          <option value="">Alle Daten</option>
          <option value="today">Heute</option>
          <option value="week">Letzte 7 Tage</option>
          <option value="month">Letzter Monat</option>
          <option value="year">Letztes Jahr</option>
          <option value="custom">Benutzerdefiniert</option>
        </select>
      </div>
      <div id="customDateContainer" class="custom-date-container" style="display: none;">
        <input type="date" id="customDateStart" aria-label="Startdatum">
        <span>bis</span>
        <input type="date" id="customDateEnd" aria-label="Enddatum">
        <button id="applyCustomDate" class="btn btn-secondary">Anwenden</button>
      </div>
    </div>

    <!-- Cost List -->
    <div id="costList" class="cost-list" role="list" aria-label="Liste der Haushaltskosten">
      <!-- Kosten werden dynamisch eingefügt -->
    </div>

    <!-- Chart Container -->
    <div class="chart-container">
      <canvas id="costChart"></canvas>
    </div>
  </div>

  <script type="module" src="src/js/app.js"></script>
  <script>
    // Theme Toggle Functionality
    document.addEventListener('DOMContentLoaded', function() {
      const themeToggle = document.getElementById('themeToggle');
      const html = document.documentElement;
      
      // Load saved theme or use system preference
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        html.setAttribute('data-theme', 'dark');
        themeToggle.textContent = '☀️';
      }
      
      // Toggle theme
      themeToggle.addEventListener('click', function() {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        
        // Update button icon
        themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌍';
      });
      
      // Watch for system theme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!localStorage.getItem('theme')) {
          html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
          themeToggle.textContent = e.matches ? '☀️' : '🌍';
        }
      });
      
      // Set default date to today
      const dateInput = document.getElementById('date');
      if (dateInput && !dateInput.value) {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        dateInput.value = `${year}-${month}-${day}`;
      }
    });
  </script>
</body>
</html>
